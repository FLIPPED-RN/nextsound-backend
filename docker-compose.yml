version: '3.8'

services:
  backend:
    build: .
    container_name: nextsound_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Database (external managed MySQL cluster)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # App
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      # Mail (SMTP)
      MAIL_ENABLED: ${MAIL_ENABLED}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      # S3 storage
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      # YooKassa
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_RECEIPT: ${YOOKASSA_RECEIPT}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_network

volumes:
  uploads_data:

networks:
  app_network:
    driver: bridge
