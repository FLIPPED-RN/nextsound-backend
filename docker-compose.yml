version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nextsound_mysql
    restart: unless-stopped
    command: --performance-schema=OFF --innodb-buffer-pool-size=64M --max-connections=100
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  backend:
    build: .
    container_name: nextsound_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # App
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      # Mail (SMTP)
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
    networks:
      - app_network

volumes:
  mysql_data:
  uploads_data:

networks:
  app_network:
    driver: bridge